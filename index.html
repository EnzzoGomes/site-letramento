<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Letramento Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1875E2;
            --bg-dark: #041833;
            --bg-card: #111e31;
            --text-main: #FFFFFF;
            --text-muted: #9ca3af;
            --border: #2e3b4e;
            --success: #3fb950;
            --accent: #00f2ff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
        }

        nav {
            background: rgba(4, 24, 51, 0.8);
            backdrop-filter: blur(10px);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #fff, #1875E2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .main-content {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 30px;
        }

        .card {
            background: var(--bg-card);
            padding: 24px;
            border-radius: 12px;
            border: 1px solid var(--border);
            transition: border-color 0.3s ease;
        }

        .card:hover {
            border-color: var(--primary);
        }

        .card h3 {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--primary);
            margin-bottom: 20px;
        }

        .aluno {
            background: rgba(255, 255, 255, 0.03);
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid transparent;
        }

        .aluno:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--border);
        }

        .aluno-nome {
            font-weight: bold;
            font-size: 0.95rem;
        }

        .xp-badge {
            color: var(--accent);
            font-size: 0.8rem;
            font-weight: 600;
        }

        .aula {
            background: var(--bg-card);
            padding: 18px;
            margin-bottom: 12px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border);
            transition: 0.3s;
        }

        .aula:hover {
            background: #1c2c41;
        }

        .aula.concluida {
            border-left: 4px solid var(--success);
        }

        .aula-xp {
            color: var(--success);
            font-weight: bold;
            font-size: 0.9rem;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            transition: 0.2s;
        }

        .btn:hover {
            filter: brightness(1.2);
            transform: translateY(-1px);
        }

        .selo {
            background: #1c2c41;
            color: var(--accent);
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.75rem;
            border: 1px solid var(--accent);
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #1c2c41;
            border-radius: 10px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            width: 60%;
            box-shadow: 0 0 10px var(--primary);
        }

        .ranking-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }
    </style>
</head>
<body>
    <nav>
        <div style="font-weight: 800; font-size: 1.4rem; letter-spacing: -1px;">
            ALURA<span style="color:var(--primary)">_FRONT</span>
        </div>
        <div style="font-size: 0.9rem; font-weight: 500;">
            <span style="margin-left: 30px; cursor: pointer;">MEU APRENDIZADO</span>
            <span style="margin-left: 30px; cursor: pointer; color: var(--primary);">COMUNIDADE</span>
            <span style="margin-left: 30px; cursor: pointer; border: 1px solid var(--primary); padding: 5px 15px; border-radius: 4px;">SAIR</span>
        </div>
    </nav>

    <div class="container">
        <header>
            <h1>Letramento Digital_</h1>
            <p class="subtitle">Domine as ferramentas que moldam o futuro da tecnologia.</p>
        </header>

        <div class="main-content">
            <div>
                <div class="card" style="margin-bottom: 20px;">
                    <h3>Status da Trilha</h3>
                    <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                        <span style="font-size: 1.5rem; font-weight: bold;">IA & PROMPT ENG.</span>
                        <span style="color: var(--success); font-size: 0.9rem;">60% CONCLUÍDO</span>
                    </div>
                    <div class="progress-bar"><div class="progress-fill"></div></div>
                </div>
                
                <h3 style="margin: 30px 0 15px; font-size: 0.9rem; color: var(--text-muted);">AULAS DISPONÍVEIS</h3>
                <div id="listaAulas"></div>
            </div>

            <div class="sidebar">
                <div class="card" style="margin-bottom: 20px;">
                    <h3>RANKING GLOBAL</h3>
                    <div id="ranking"></div>
                </div>

                <div class="card">
                    <h3>COLABORADORES</h3>
                    <div id="listaAlunos"></div>
                    <button class="btn" style="width: 100%; margin-top: 15px;" onclick="adicionarAluno()">+ CONVIDAR</button>
                </div>
            </div>
        </div>

    <!-- MODAL PARA NOVO ALUNO -->
    <div id="modalAluno" class="modal">
        <div class="modal-content">
            <span class="close" onclick="fecharModal('modalAluno')">&times;</span>
            <h2>Adicionar Novo Aluno</h2>
            <input type="text" id="nomeAluno" placeholder="Digite o nome do aluno">
            <button class="btn" onclick="salvarAluno()">Salvar</button>
        </div>
    </div>

    <!-- MODAL PARA NOVO TÓPICO -->
    <div id="modalTopico" class="modal">
        <div class="modal-content">
            <span class="close" onclick="fecharModal('modalTopico')">&times;</span>
            <h2>Criar Novo Tópico</h2>
            <input type="text" id="tituloTopico" placeholder="Título da dúvida">
            <input type="text" id="autorTopico" placeholder="Seu nome">
            <button class="btn" onclick="salvarTopico()">Criar</button>
        </div>
    </div>

    <script>
        // ===== MODELOS =====
        class Aula {
            constructor(id, titulo, xp) {
                this.id = id;
                this.titulo = titulo;
                this.xpRecompensa = xp;
            }
        }

        class Modulo {
            constructor(nome) {
                this.nome = nome;
                this.aulas = [];
            }

            addAula(aula) {
                this.aulas.push(aula);
            }
        }

        class Trilha {
            constructor(nome, categoria, selo) {
                this.nome = nome;
                this.categoria = categoria;
                this.seloAlvo = selo;
                this.modulos = [];
            }

            addModulo(modulo) {
                this.modulos.push(modulo);
            }
        }

        class Usuario {
            constructor(nome) {
                this.nome = nome;
                this.xp = 0;
                this.aulasConcluidas = new Set();
                this.conquistas = [];
            }

            ganharXp(pts) {
                this.xp += pts;
            }

            registrarAula(id) {
                this.aulasConcluidas.add(id);
            }
        }

        class TopicoForum {
            constructor(titulo, autor) {
                this.titulo = titulo;
                this.autor = autor;
                this.respostas = [];
            }

            responder(msg) {
                this.respostas.push(msg);
            }
        }

        // ===== ESTADO DA APLICAÇÃO =====
        let alunos = [];
        let trilhaIA;
        let topicos = [];
        let aulasGlobais = [];

        // ===== INICIALIZAÇÃO =====
        function inicializar() {
            // Criar Trilha
            trilhaIA = new Trilha("IA & Futuro", "IA_FUTURO", "OURO");
            
            // Criar Módulo
            const m1 = new Modulo("Fundamentos de IA");
            
            // Criar Aulas
            const a1 = new Aula(1, "O que é ChatGPT?", 500);
            const a2 = new Aula(2, "Prompt Engineering", 500);
            
            aulasGlobais = [a1, a2];
            
            m1.addAula(a1);
            m1.addAula(a2);
            trilhaIA.addModulo(m1);

            // Alunos iniciais
            alunos = [
                new Usuario("Gabriel"),
                new Usuario("Beatriz")
            ];

            // Fórum inicial
            const topico1 = new TopicoForum("Dúvida sobre Prompts", "Beatriz");
            topico1.responder("Use o método Persona para melhores resultados!");
            topicos.push(topico1);

            renderizar();
        }

        // ===== FUNÇÕES DE NEGÓCIO =====
        function completarAula(nomeAluno, idAula) {
            const aluno = alunos.find(a => a.nome === nomeAluno);
            if (!aluno) {
                alert("Aluno não encontrado!");
                return;
            }

            if (aluno.aulasConcluidas.has(idAula)) {
                alert(`${aluno.nome} já assistiu essa aula!`);
                return;
            }

            const aula = aulasGlobais.find(a => a.id === idAula);
            aluno.registrarAula(idAula);
            aluno.ganharXp(aula.xpRecompensa);

            alert(`✅ Parabéns! ${aluno.nome} concluiu: ${aula.titulo}`);
            renderizar();
        }

        function verificarCertificado(nomeAluno, trilha) {
            const aluno = alunos.find(a => a.nome === nomeAluno);
            if (!aluno) return false;

            let todasAulas = [];
            trilha.modulos.forEach(m => {
                m.aulas.forEach(a => todasAulas.push(a.id));
            });

            const temTodas = todasAulas.every(id => aluno.aulasConcluidas.has(id));
            
            if (temTodas && !aluno.conquistas.includes(trilha.seloAlvo)) {
                const certificado = `CERTIFICADO ${trilha.seloAlvo} - ${trilha.nome}`;
                aluno.conquistas.push(certificado);
                alert(`🎓 Parabéns! Selo ${trilha.seloAlvo} desbloqueado para ${aluno.nome}!`);
                return true;
            }
            return temTodas;
        }

        function adicionarAluno() {
            document.getElementById('modalAluno').style.display = 'block';
        }

        function salvarAluno() {
            const nome = document.getElementById('nomeAluno').value.trim();
            if (!nome) {
                alert("Digite um nome!");
                return;
            }

            if (alunos.find(a => a.nome === nome)) {
                alert("Aluno já existe!");
                return;
            }

            alunos.push(new Usuario(nome));
            fecharModal('modalAluno');
            document.getElementById('nomeAluno').value = '';
            renderizar();
        }

        function adicionarTopico() {
            document.getElementById('modalTopico').style.display = 'block';
        }

        function salvarTopico() {
            const titulo = document.getElementById('tituloTopico').value.trim();
            const autor = document.getElementById('autorTopico').value.trim();

            if (!titulo || !autor) {
                alert("Preencha todos os campos!");
                return;
            }

            topicos.push(new TopicoForum(titulo, autor));
            fecharModal('modalTopico');
            document.getElementById('tituloTopico').value = '';
            document.getElementById('autorTopico').value = '';
            renderizar();
        }

        function fecharModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        // ===== RENDERIZAÇÃO =====
        function renderizar() {
            renderizarAlunos();
            renderizarAulas();
            renderizarRanking();
            renderizarCertificados();
            renderizarForum();
        }

        function renderizarAlunos() {
            const container = document.getElementById('listaAlunos');
            container.innerHTML = alunos.map(aluno => `
                <div class="aluno">
                    <span class="aluno-nome">${aluno.nome}</span>
                    <span class="xp-badge">${aluno.xp} XP</span>
                </div>
            `).join('');
        }

        function renderizarAulas() {
            const container = document.getElementById('listaAulas');
            const todasConcluidas = {};
            
            alunos.forEach(aluno => {
                aulasGlobais.forEach(aula => {
                    if (aluno.aulasConcluidas.has(aula.id)) {
                        if (!todasConcluidas[aula.id]) todasConcluidas[aula.id] = 0;
                        todasConcluidas[aula.id]++;
                    }
                });
            });

            container.innerHTML = aulasGlobais.map(aula => {
                const concluida = todasConcluidas[aula.id] > 0;
                return `
                    <div class="aula ${concluida ? 'concluida' : ''}" onclick="selecionarAula(${aula.id})">
                        <div class="aula-titulo">${aula.titulo}</div>
                        <div class="aula-xp">💰 ${aula.xpRecompensa} XP</div>
                        <div style="color: #999; font-size: 0.85em; margin-top: 5px;">Concluída por ${todasConcluidas[aula.id] || 0} aluno(s)</div>
                    </div>
                `;
            }).join('');
        }

        function selecionarAula(idAula) {
            const aula = aulasGlobais.find(a => a.id === idAula);
            const aluno = alunos[0]; // Usar primeiro aluno como exemplo
            
            if (aluno) {
                completarAula(aluno.nome, idAula);
            } else {
                alert("Adicione um aluno primeiro!");
            }
        }

        function renderizarRanking() {
            const container = document.getElementById('ranking');
            const ranking = [...alunos].sort((a, b) => b.xp - a.xp);

            container.innerHTML = ranking.map((aluno, idx) => {
                const medals = ['🥇', '🥈', '🥉'];
                const medal = medals[idx] || '⭐';
                return `
                    <div class="ranking-item">
                        <span>${medal} ${aluno.nome}</span>
                        <span>${aluno.xp} XP</span>
                    </div>
                `;
            }).join('');
        }

        function renderizarCertificados() {
            const container = document.getElementById('certificados');
            let html = '';

            alunos.forEach(aluno => {
                if (aluno.conquistas.length > 0) {
                    html += `<p><strong>${aluno.nome}:</strong> `;
                    aluno.conquistas.forEach(cert => {
                        html += `<span class="selo">${cert}</span> `;
                    });
                    html += `</p>`;
                } else {
                    html += `<p><strong>${aluno.nome}:</strong> Nenhum certificado ainda</p>`;
                }
            });

            container.innerHTML = html || '<p>Nenhum certificado desbloqueado ainda</p>';
        }

        function renderizarForum() {
            const container = document.getElementById('forum');
            container.innerHTML = topicos.map((topico, idx) => `
                <div class="forum">
                    <div class="forum-titulo">📌 ${topico.titulo}</div>
                    <div class="forum-autor">por ${topico.autor}</div>
                    ${topico.respostas.map(resposta => `
                        <div class="resposta">✓ ${resposta}</div>
                    `).join('')}
                    <input type="text" placeholder="Adicionar resposta..." onkeypress="if(event.key==='Enter') adicionarResposta(${idx}, this.value); this.value='';">
                </div>
            `).join('');
        }

        function adicionarResposta(idx, texto) {
            if (!texto.trim()) return;
            topicos[idx].responder(texto);
            renderizar();
        }

        // Fechar modal ao clicar fora
        window.onclick = function(event) {
            const modalAluno = document.getElementById('modalAluno');
            const modalTopico = document.getElementById('modalTopico');
            if (event.target === modalAluno) modalAluno.style.display = 'none';
            if (event.target === modalTopico) modalTopico.style.display = 'none';
        }

        // Iniciar aplicação
        window.onload = inicializar;
    </script>
</body>
</html>
