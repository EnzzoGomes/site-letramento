<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNISO Voluntarios - Plataforma de Ensino</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ============================================
           RESET E VARIAVEIS CSS
           ============================================ */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --purple-dark: #2D1B69;
            --purple-medium: #5B2D8E;
            --purple-light: #8B5CF6;
            --purple-lighter: #EDE9FE;
            --purple-pastel: #F5F3FF;
            --white: #FFFFFF;
            --gray-dark: #1F2937;
            --gray-medium: #6B7280;
            --gray-light: #E5E7EB;
            --success: #10B981;
            --error: #EF4444;
            --warning: #F59E0B;
            --sidebar-width: 260px;
            --sidebar-collapsed: 70px;
            --header-height: 60px;
            --shadow-sm: 0 1px 2px 0 rgba(45, 27, 105, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(45, 27, 105, 0.1), 0 2px 4px -1px rgba(45, 27, 105, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(45, 27, 105, 0.1), 0 4px 6px -2px rgba(45, 27, 105, 0.05);
            --shadow-xl: 0 20px 25px -5px rgba(45, 27, 105, 0.1), 0 10px 10px -5px rgba(45, 27, 105, 0.04);
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            --transition-fast: 150ms ease;
            --transition-normal: 250ms ease;
            --transition-slow: 350ms ease;
        }

        html {
            font-size: 16px;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--purple-pastel);
            color: var(--gray-dark);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ============================================
           SCROLLBAR CUSTOMIZADA
           ============================================ */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--purple-lighter);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--purple-medium);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--purple-dark);
        }

        ::selection {
            background-color: var(--purple-light);
            color: var(--white);
        }

        /* ============================================
           ANIMACOES
           ============================================ */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInFast {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .fade-in {
            animation: fadeIn 0.4s ease forwards;
        }

        .slide-in-right {
            animation: slideInRight 0.3s ease forwards;
        }

        .scale-in {
            animation: scaleIn 0.3s ease forwards;
        }

        /* ============================================
           COMPONENTES BASE
           ============================================ */
        .hidden {
            display: none !important;
        }

        .flex {
            display: flex;
        }

        .items-center {
            align-items: center;
        }

        .justify-between {
            justify-content: space-between;
        }

        .gap-2 { gap: 8px; }
        .gap-3 { gap: 12px; }
        .gap-4 { gap: 16px; }

        .mt-2 { margin-top: 8px; }
        .mt-3 { margin-top: 12px; }
        .mt-4 { margin-top: 16px; }
        .mb-2 { margin-bottom: 8px; }
        .mb-3 { margin-bottom: 12px; }
        .mb-4 { margin-bottom: 16px; }

        .p-3 { padding: 12px; }
        .p-4 { padding: 16px; }
        .p-6 { padding: 24px; }

        .w-full { width: 100%; }
        .text-center { text-align: center; }
        .font-bold { font-weight: 700; }
        .font-semibold { font-weight: 600; }
        .text-sm { font-size: 0.875rem; }
        .text-base { font-size: 1rem; }
        .text-xl { font-size: 1.25rem; }
        .text-2xl { font-size: 1.5rem; }

        /* ============================================
           BOTOES
           ============================================ */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            font-family: inherit;
            font-size: 0.875rem;
            font-weight: 600;
            border-radius: var(--radius-md);
            border: none;
            cursor: pointer;
            transition: all var(--transition-normal);
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--purple-medium), var(--purple-dark));
            color: var(--white);
            box-shadow: 0 4px 14px rgba(91, 45, 142, 0.4);
        }

        .btn-primary:hover:not(:disabled) {
            background: linear-gradient(135deg, var(--purple-light), var(--purple-medium));
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--white);
            color: var(--purple-dark);
            border: 2px solid var(--purple-light);
        }

        .btn-secondary:hover:not(:disabled) {
            background: var(--purple-lighter);
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 0.75rem;
        }

        .btn-icon {
            width: 40px;
            height: 40px;
            padding: 0;
            border-radius: 50%;
        }

        /* ============================================
           INPUTS E FORMULARIOS
           ============================================ */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--gray-dark);
        }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 12px 16px;
            font-family: inherit;
            font-size: 0.875rem;
            color: var(--gray-dark);
            background: var(--white);
            border: 2px solid var(--gray-light);
            border-radius: var(--radius-md);
            transition: all var(--transition-fast);
            outline: none;
        }

        .form-input:focus {
            border-color: var(--purple-light);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
        }

        .form-checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-checkbox {
            width: 20px;
            height: 20px;
            accent-color: var(--purple-medium);
            cursor: pointer;
        }

        .input-group {
            position: relative;
        }

        .input-group .form-input {
            padding-left: 44px;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray-medium);
            pointer-events: none;
        }

        /* ============================================
           CARDS
           ============================================ */
        .card {
            background: var(--white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            overflow: hidden;
        }

        .card-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--gray-light);
        }

        .card-body {
            padding: 24px;
        }

        .card-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--gray-dark);
        }

        /* ============================================
           BADGES
           ============================================ */
        .badge {
            display: inline-flex;
            padding: 4px 10px;
            font-size: 0.75rem;
            font-weight: 600;
            border-radius: 20px;
        }

        .badge-primary {
            background: var(--purple-lighter);
            color: var(--purple-dark);
        }

        .badge-success {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
        }

        /* ============================================
           PROGRESS BAR
           ============================================ */
        .progress {
            width: 100%;
            height: 8px;
            background: var(--gray-light);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--purple-light), var(--purple-medium));
            border-radius: 10px;
            transition: width var(--transition-slow);
        }

        /* ============================================
           TOASTS
           ============================================ */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 400px;
        }

        .toast {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 16px;
            background: var(--white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-xl);
            animation: slideInRight 0.3s ease forwards;
            border-left: 4px solid;
        }

        .toast-success { border-color: var(--success); }
        .toast-error { border-color: var(--error); }

        .toast-content {
            flex: 1;
        }

        .toast-title {
            font-weight: 600;
            font-size: 0.875rem;
        }

        .toast-message {
            font-size: 0.8125rem;
            color: var(--gray-medium);
            margin-top: 2px;
        }

        .toast-close {
            background: none;
            border: none;
            color: var(--gray-medium);
            cursor: pointer;
            padding: 4px;
        }

        /* ============================================
           MODAL
           ============================================ */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(45, 27, 105, 0.6);
            backdrop-filter: blur(4px);
            z-index: 9000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal {
            background: var(--white);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            animation: scaleIn 0.3s ease forwards;
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--gray-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--gray-medium);
        }

        .modal-body {
            padding: 24px;
            overflow-y: auto;
        }

        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--gray-light);
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        /* ============================================
           LOADING
           ============================================ */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(245, 243, 255, 0.9);
            z-index: 9500;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--purple-lighter);
            border-top-color: var(--purple-medium);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* ============================================
           SIDEBAR
           ============================================ */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: var(--sidebar-width);
            height: 100vh;
            background: linear-gradient(180deg, var(--purple-dark), #1E1448);
            color: var(--white);
            z-index: 8000;
            display: flex;
            flex-direction: column;
            transition: all var(--transition-normal);
        }

        .sidebar.collapsed {
            width: var(--sidebar-collapsed);
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar-logo {
            width: 40px;
            height: 40px;
            background: var(--white);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sidebar-logo-text {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--purple-dark);
        }

        .sidebar-brand h1 {
            font-size: 0.875rem;
            font-weight: 700;
        }

        .sidebar-brand span {
            font-size: 0.6875rem;
            opacity: 0.7;
        }

        .sidebar-toggle {
            background: none;
            border: none;
            color: var(--white);
            cursor: pointer;
            padding: 8px;
            border-radius: var(--radius-md);
        }

        .sidebar-nav {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            border-radius: var(--radius-md);
            transition: all var(--transition-fast);
            cursor: pointer;
            margin-bottom: 4px;
        }

        .sidebar-link:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--white);
        }

        .sidebar-link.active {
            background: var(--purple-medium);
            color: var(--white);
        }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar-user {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--purple-light), var(--purple-medium));
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-weight: 600;
        }

        /* ============================================
           HEADER
           ============================================ */
        .header {
            position: fixed;
            top: 0;
            left: var(--sidebar-width);
            right: 0;
            height: var(--header-height);
            background: var(--white);
            border-bottom: 1px solid var(--gray-light);
            display: flex;
            align-items: center;
            padding: 0 24px;
            z-index: 7000;
            transition: left var(--transition-normal);
        }

        .sidebar.collapsed ~ .header {
            left: var(--sidebar-collapsed);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-left: auto;
        }

        .header-user {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 12px 6px 6px;
            border-radius: var(--radius-xl);
            cursor: pointer;
        }

        .header-user:hover {
            background: var(--purple-pastel);
        }

        /* ============================================
           MAIN CONTENT
           ============================================ */
        .main-content {
            margin-left: var(--sidebar-width);
            margin-top: var(--header-height);
            min-height: calc(100vh - var(--header-height));
            padding: 24px;
            transition: margin-left var(--transition-normal);
        }

        .sidebar.collapsed ~ .main-content {
            margin-left: var(--sidebar-collapsed);
        }

        .page-header {
            margin-bottom: 24px;
        }

        .page-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--gray-dark);
        }

        /* ============================================
           GRID
           ============================================ */
        .grid {
            display: grid;
            gap: 24px;
        }

        .grid-cols-1 { grid-template-columns: repeat(1, 1fr); }
        .grid-cols-2 { grid-template-columns: repeat(2, 1fr); }
        .grid-cols-3 { grid-template-columns: repeat(3, 1fr); }
        .grid-cols-4 { grid-template-columns: repeat(4, 1fr); }

        /* ============================================
           STAT CARDS
           ============================================ */
        .stat-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: var(--shadow-md);
        }

        .stat-icon {
            width: 56px;
            height: 56px;
            border-radius: var(--radius-lg);
            background: var(--purple-lighter);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
        }

        /* ============================================
           AUTH PAGES
           ============================================ */
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--purple-dark), var(--purple-medium));
            padding: 20px;
        }

        .auth-card {
            background: var(--white);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            width: 100%;
            max-width: 440px;
            overflow: hidden;
        }

        .auth-header {
            background: linear-gradient(135deg, var(--purple-medium), var(--purple-dark));
            padding: 32px;
            text-align: center;
        }

        .auth-logo {
            width: 64px;
            height: 64px;
            background: var(--white);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }

        .auth-logo-text {
            font-size: 2rem;
            font-weight: 800;
            color: var(--purple-dark);
        }

        .auth-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--white);
        }

        .auth-body {
            padding: 32px;
        }

        .auth-divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 24px 0;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--gray-light);
        }

        /* ============================================
           COURSE CARDS
           ============================================ */
        .course-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-md);
            cursor: pointer;
            transition: transform var(--transition-normal);
        }

        .course-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .course-card-image {
            width: 100%;
            height: 160px;
            background: linear-gradient(135deg, var(--purple-light), var(--purple-medium));
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .course-card-body {
            padding: 16px;
        }

        .course-card-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .course-card-description {
            font-size: 0.8125rem;
            color: var(--gray-medium);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 991px) {
            .sidebar {
                transform: translateX(-100%);
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .header, .main-content {
                left: 0;
                margin-left: 0;
            }
            .grid-cols-3, .grid-cols-4 {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 767px) {
            .grid-cols-2, .grid-cols-3, .grid-cols-4 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="loading-overlay" class="loading-overlay">
        <div class="spinner"></div>
        <p class="loading-text">Carregando...</p>
    </div>
    <div id="toast-container" class="toast-container"></div>

    <div id="auth-container" class="auth-container">
        <div id="login-form" class="auth-card">
            <div class="auth-header">
                <div class="auth-logo"><span class="auth-logo-text">UV</span></div>
                <h2 class="auth-title">UNISO Voluntarios</h2>
                <p class="text-sm" style="color:rgba(255,255,255,0.7);">Plataforma de Ensino</p>
            </div>
            <div class="auth-body">
                <form id="login-form-element">
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <div class="input-group">
                            <span class="input-icon">👤</span>
                            <input type="email" class="form-input" id="login-email" placeholder="seu@email.com" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Senha</label>
                        <div class="input-group">
                            <span class="input-icon">🔒</span>
                            <input type="password" class="form-input" id="login-password" placeholder="Sua senha" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-full">Entrar</button>
                </form>
                <div class="auth-divider"><span>ou</span></div>
                <button type="button" class="btn btn-secondary w-full" onclick="showRegisterForm()">Criar conta</button>
            </div>
        </div>

        <div id="register-form" class="auth-card hidden">
            <div class="auth-header">
                <div class="auth-logo"><span class="auth-logo-text">UV</span></div>
                <h2 class="auth-title">Criar Conta</h2>
            </div>
            <div class="auth-body">
                <form id="register-form-element">
                    <div class="form-group">
                        <label class="form-label">Nome completo</label>
                        <input type="text" class="form-input" id="register-name" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-input" id="register-email" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Senha</label>
                        <input type="password" class="form-input" id="register-password" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Confirmar senha</label>
                        <input type="password" class="form-input" id="register-confirm-password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-full">Cadastrar</button>
                </form>
                <p class="text-center mt-4"><a href="#" onclick="showLoginForm(event)" style="color:var(--purple-medium);">Já tem conta? Entrar</a></p>
            </div>
        </div>
    </div>

    <div id="app-container" class="hidden">
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo"><span class="sidebar-logo-text">UV</span></div>
                <div class="sidebar-brand"><h1>UNISO Voluntarios</h1><span>Plataforma de Ensino</span></div>
                <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
            </div>
            <nav class="sidebar-nav" id="sidebar-nav"></nav>
            <div class="sidebar-footer">
                <div class="sidebar-user">
                    <div class="avatar" id="sidebar-avatar"><span id="sidebar-avatar-initials">AD</span></div>
                    <div class="sidebar-user-info"><div class="sidebar-user-name" id="sidebar-user-name">Usuário</div></div>
                </div>
            </div>
        </aside>

        <header class="header">
            <div class="header-right">
                <div class="header-user" onclick="toggleUserMenu()">
                    <div class="header-user-info"><div class="header-user-name" id="header-user-name">Usuário</div></div>
                    <div class="avatar" id="header-avatar"><span id="header-avatar-initials">AD</span></div>
                </div>
            </div>
            <div id="user-menu" class="dropdown-menu hidden" style="position:absolute;top:60px;right:20px;background:white;border-radius:8px;box-shadow:0 10px 25px rgba(0,0,0,0.1);padding:8px 0;min-width:180px;z-index:1000;">
                <button class="dropdown-item" onclick="navigateTo('profile')" style="width:100%;padding:10px 16px;text-align:left;background:none;border:none;cursor:pointer;">Meu Perfil</button>
                <button class="dropdown-item" onclick="logout()" style="width:100%;padding:10px 16px;text-align:left;background:none;border:none;cursor:pointer;">Sair</button>
            </div>
        </header>

        <main class="main-content" id="main-content"></main>
    </div>
    <div id="modal-container"></div>

    <script>
        // Dados mockados
        let currentUser = null;
        let courses = [
            { id: '1', title: 'Word - Do Básico ao Avançado', description: 'Aprenda a dominar o Microsoft Word desde os conceitos básicos até recursos avançados.', category: 'Pacote Office', workload: 20, level: 'Básico', status: 'ativo' },
            { id: '2', title: 'Excel Essencial', description: 'Domine as planilhas eletrônicas com fórmulas, funções e gráficos profissionais.', category: 'Pacote Office', workload: 24, level: 'Básico', status: 'ativo' },
            { id: '3', title: 'PowerPoint - Apresentações Profissionais', description: 'Crie apresentações impactantes que encantam seu público.', category: 'Pacote Office', workload: 16, level: 'Básico', status: 'ativo' },
            { id: '4', title: 'Introdução à Inteligência Artificial', description: 'Descubra o mundo da IA e como ela pode transformar seu dia a dia.', category: 'Inteligência Artificial', workload: 20, level: 'Básico', status: 'ativo' },
            { id: '5', title: 'Informática Básica - Fundamentos', description: 'Aprenda os fundamentos da informática do zero.', category: 'Informática Básica', workload: 18, level: 'Básico', status: 'ativo' }
        ];
        
        let enrollments = [];
        let certificates = [];
        
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<div class="toast-content"><div class="toast-title">${type === 'success' ? 'Sucesso' : 'Erro'}</div><div class="toast-message">${message}</div></div><button class="toast-close" onclick="this.parentElement.remove()">✕</button>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        }
        
        function showLoading(show) {
            document.getElementById('loading-overlay').style.display = show ? 'flex' : 'none';
        }
        
        function saveToLocalStorage() {
            localStorage.setItem('users', JSON.stringify(users));
            localStorage.setItem('courses', JSON.stringify(courses));
            localStorage.setItem('enrollments', JSON.stringify(enrollments));
            localStorage.setItem('certificates', JSON.stringify(certificates));
        }
        
        let users = [
            { id: '1', name: 'Administrador UNISO', email: 'admin@uniso.br', password: 'admin123', role: 'admin' },
            { id: '2', name: 'João Silva', email: 'aluno@uniso.br', password: 'aluno123', role: 'aluno' }
        ];
        
        function initData() {
            const storedUsers = localStorage.getItem('users');
            const storedCourses = localStorage.getItem('courses');
            const storedEnrollments = localStorage.getItem('enrollments');
            const storedCertificates = localStorage.getItem('certificates');
            if (storedUsers) users = JSON.parse(storedUsers);
            if (storedCourses) courses = JSON.parse(storedCourses);
            if (storedEnrollments) enrollments = JSON.parse(storedEnrollments);
            if (storedCertificates) certificates = JSON.parse(storedCertificates);
        }
        
        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const user = users.find(u => u.email === email && u.password === password);
            if (user) {
                currentUser = user;
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                showToast('Login realizado com sucesso!');
                document.getElementById('auth-container').classList.add('hidden');
                document.getElementById('app-container').classList.remove('hidden');
                updateUserInterface();
                loadDashboard();
            } else {
                showToast('Email ou senha inválidos', 'error');
            }
        }
        
        function handleRegister(e) {
            e.preventDefault();
            const name = document.getElementById('register-name').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            const confirm = document.getElementById('register-confirm-password').value;
            if (password !== confirm) {
                showToast('As senhas não coincidem', 'error');
                return;
            }
            if (users.find(u => u.email === email)) {
                showToast('Email já cadastrado', 'error');
                return;
            }
            const newUser = { id: String(users.length + 1), name, email, password, role: 'aluno' };
            users.push(newUser);
            saveToLocalStorage();
            showToast('Cadastro realizado! Faça login.');
            showLoginForm();
        }
        
        function showLoginForm(e) {
            if (e) e.preventDefault();
            document.getElementById('login-form').classList.remove('hidden');
            document.getElementById('register-form').classList.add('hidden');
        }
        
        function showRegisterForm() {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('register-form').classList.remove('hidden');
        }
        
        function logout() {
            currentUser = null;
            localStorage.removeItem('currentUser');
            document.getElementById('auth-container').classList.remove('hidden');
            document.getElementById('app-container').classList.add('hidden');
            showToast('Logout realizado');
        }
        
        function updateUserInterface() {
            if (currentUser) {
                const initials = currentUser.name.substring(0, 2).toUpperCase();
                document.getElementById('sidebar-avatar-initials').innerText = initials;
                document.getElementById('header-avatar-initials').innerText = initials;
                document.getElementById('sidebar-user-name').innerText = currentUser.name;
                document.getElementById('header-user-name').innerText = currentUser.name;
                renderSidebar();
            }
        }
        
        function renderSidebar() {
            const nav = document.getElementById('sidebar-nav');
            const items = currentUser.role === 'admin' 
                ? [{ id: 'dashboard', label: 'Dashboard', icon: '📊' }, { id: 'courses', label: 'Cursos', icon: '📚' }, { id: 'students', label: 'Alunos', icon: '👥' }]
                : [{ id: 'dashboard', label: 'Meus Cursos', icon: '🎓' }, { id: 'certificates', label: 'Certificados', icon: '🏆' }];
            nav.innerHTML = items.map(item => `<div class="sidebar-link" onclick="navigateTo('${item.id}')"><span>${item.icon}</span><span>${item.label}</span></div>`).join('');
        }
        
        function navigateTo(page) {
            if (page === 'dashboard') loadDashboard();
            else if (page === 'courses') loadCourses();
            else if (page === 'students') loadStudents();
            else if (page === 'certificates') loadCertificates();
            else if (page === 'profile') loadProfile();
        }
        
        function loadDashboard() {
            const content = document.getElementById('main-content');
            const userEnrollments = enrollments.filter(e => e.userId === currentUser.id);
            const completedCourses = userEnrollments.filter(e => e.progress >= 70).length;
            const inProgress = userEnrollments.filter(e => e.progress > 0 && e.progress < 70).length;
            
            let html = `<div class="page-header"><h1 class="page-title">Bem-vindo, ${currentUser.name}</h1></div>`;
            
            if (currentUser.role === 'admin') {
                html += `<div class="grid grid-cols-4">
                    <div class="stat-card"><div class="stat-icon">📚</div><div><div class="stat-value">${courses.length}</div><div>Cursos</div></div></div>
                    <div class="stat-card"><div class="stat-icon">👥</div><div><div class="stat-value">${users.length}</div><div>Alunos</div></div></div>
                    <div class="stat-card"><div class="stat-icon">📝</div><div><div class="stat-value">${enrollments.length}</div><div>Matrículas</div></div></div>
                    <div class="stat-card"><div class="stat-icon">🏆</div><div><div class="stat-value">${certificates.length}</div><div>Certificados</div></div></div>
                </div>`;
                html += `<div class="card mt-4"><div class="card-header"><h3 class="card-title">Cursos Disponíveis</h3></div><div class="card-body"><div class="grid grid-cols-3">`;
                courses.slice(0, 3).forEach(course => {
                    html += `<div class="course-card" onclick="viewCourse('${course.id}')"><div class="course-card-image">📘</div><div class="course-card-body"><h4 class="course-card-title">${course.title}</h4><p class="course-card-description">${course.description.substring(0, 80)}...</p></div></div>`;
                });
                html += `</div></div></div>`;
            } else {
                html += `<div class="grid grid-cols-2"><div class="stat-card"><div class="stat-icon">📚</div><div><div class="stat-value">${userEnrollments.length}</div><div>Cursos Matriculados</div></div></div>
                <div class="stat-card"><div class="stat-icon">🏆</div><div><div class="stat-value">${completedCourses}</div><div>Cursos Concluídos</div></div></div></div>`;
                html += `<div class="card mt-4"><div class="card-header"><h3 class="card-title">Meus Cursos</h3></div><div class="card-body">`;
                const enrolledCourses = userEnrollments.map(e => courses.find(c => c.id === e.courseId)).filter(c => c);
                if (enrolledCourses.length === 0) {
                    html += `<p class="text-center">Você ainda não está matriculado em nenhum curso. <button class="btn btn-primary btn-sm" onclick="navigateTo('courses')">Explorar Cursos</button></p>`;
                } else {
                    html += `<div class="grid grid-cols-2">`;
                    enrolledCourses.forEach(course => {
                        const enrollment = userEnrollments.find(e => e.courseId === course.id);
                        html += `<div class="course-card"><div class="course-card-image">📘</div><div class="course-card-body"><h4 class="course-card-title">${course.title}</h4><div class="progress mt-2"><div class="progress-bar" style="width: ${enrollment?.progress || 0}%"></div></div><p class="text-sm mt-2">Progresso: ${enrollment?.progress || 0}%</p><button class="btn btn-primary btn-sm mt-2" onclick="viewCourse('${course.id}')">Continuar</button></div></div>`;
                    });
                    html += `</div>`;
                }
                html += `</div></div>`;
            }
            content.innerHTML = html;
        }
        
        function loadCourses() {
            const content = document.getElementById('main-content');
            const userEnrollments = enrollments.filter(e => e.userId === currentUser.id);
            const enrolledIds = userEnrollments.map(e => e.courseId);
            
            let html = `<div class="page-header"><h1 class="page-title">Cursos Disponíveis</h1></div><div class="grid grid-cols-3">`;
            courses.forEach(course => {
                const isEnrolled = enrolledIds.includes(course.id);
                html += `<div class="course-card"><div class="course-card-image">📘</div><div class="course-card-body"><h4 class="course-card-title">${course.title}</h4><p class="course-card-description">${course.description.substring(0, 100)}</p><p class="text-sm mt-2">Carga horária: ${course.workload}h | Nível: ${course.level}</p>`;
                if (isEnrolled) {
                    html += `<button class="btn btn-primary btn-sm mt-2" onclick="viewCourse('${course.id}')">Continuar</button>`;
                } else {
                    html += `<button class="btn btn-secondary btn-sm mt-2" onclick="enrollCourse('${course.id}')">Matricular-se</button>`;
                }
                html += `</div></div>`;
            });
            html += `</div>`;
            content.innerHTML = html;
        }
        
        function enrollCourse(courseId) {
            if (enrollments.find(e => e.userId === currentUser.id && e.courseId === courseId)) {
                showToast('Você já está matriculado neste curso');
                return;
            }
            enrollments.push({ userId: currentUser.id, courseId, progress: 0, startedAt: new Date().toISOString() });
            saveToLocalStorage();
            showToast('Matrícula realizada com sucesso!');
            loadCourses();
        }
        
        function viewCourse(courseId) {
            const course = courses.find(c => c.id === courseId);
            if (!course) return;
            const enrollment = enrollments.find(e => e.userId === currentUser.id && e.courseId === courseId);
            const progress = enrollment ? enrollment.progress : 0;
            const content = document.getElementById('main-content');
            content.innerHTML = `<div class="page-header"><h1 class="page-title">${course.title}</h1><p>${course.description}</p></div>
            <div class="card"><div class="card-body"><div class="progress mb-3"><div class="progress-bar" style="width: ${progress}%"></div></div><p class="text-center">Progresso: ${progress}%</p><div class="text-center mt-4"><button class="btn btn-primary" onclick="markProgress('${courseId}')">Marcar Progresso +25%</button></div></div></div>`;
        }
        
        function markProgress(courseId) {
            const enrollment = enrollments.find(e => e.userId === currentUser.id && e.courseId === courseId);
            if (enrollment) {
                let newProgress = Math.min(enrollment.progress + 25, 100);
                enrollment.progress = newProgress;
                saveToLocalStorage();
                showToast(`Progresso atualizado: ${newProgress}%`);
                if (newProgress >= 70 && !certificates.find(c => c.userId === currentUser.id && c.courseId === courseId)) {
                    const course = courses.find(c => c.id === courseId);
                    certificates.push({ userId: currentUser.id, courseId, courseTitle: course.title, date: new Date().toISOString(), code: 'CERT-' + Math.random().toString(36).substr(2, 8).toUpperCase() });
                    saveToLocalStorage();
                    showToast('Parabéns! Você atingiu 70% e ganhou um certificado!', 'success');
                }
                viewCourse(courseId);
            }
        }
        
        function loadStudents() {
            const content = document.getElementById('main-content');
            let html = `<div class="page-header"><h1 class="page-title">Alunos Matriculados</h1></div><div class="card"><div class="card-body"><table style="width:100%;border-collapse:collapse;"><thead><tr style="border-bottom:2px solid #e5e7eb;"><th style="text-align:left;padding:12px;">Nome</th><th style="text-align:left;padding:12px;">Email</th><th style="text-align:left;padding:12px;">Cursos</th></tr></thead><tbody>`;
            users.filter(u => u.role === 'aluno').forEach(student => {
                const studentEnrollments = enrollments.filter(e => e.userId === student.id);
                const courseNames = studentEnrollments.map(e => courses.find(c => c.id === e.courseId)?.title).filter(Boolean).join(', ');
                html += `<tr style="border-bottom:1px solid #e5e7eb;"><td style="padding:12px;">${student.name}</td><td style="padding:12px;">${student.email}</td><td style="padding:12px;">${courseNames || 'Nenhum curso'}</td></tr>`;
            });
            html += `</tbody></table></div></div>`;
            content.innerHTML = html;
        }
        
        function loadCertificates() {
            const userCerts = certificates.filter(c => c.userId === currentUser.id);
            const content = document.getElementById('main-content');
            if (userCerts.length === 0) {
                content.innerHTML = `<div class="page-header"><h1 class="page-title">Meus Certificados</h1></div><div class="card"><div class="card-body text-center"><p>Você ainda não possui certificados.</p><p>Complete cursos com pelo menos 70% de progresso para ganhar seu certificado!</p></div></div>`;
                return;
            }
            let html = `<div class="page-header"><h1 class="page-title">Meus Certificados</h1></div><div class="grid grid-cols-2">`;
            userCerts.forEach(cert => {
                html += `<div class="card"><div class="card-body"><div class="text-center"><div style="font-size:3rem;">🏆</div><h3 class="mt-2">${cert.courseTitle}</h3><p class="text-sm">Concluído em: ${new Date(cert.date).toLocaleDateString()}</p><p class="text-sm">Código: ${cert.code}</p><button class="btn btn-primary btn-sm mt-3" onclick="viewCertificate('${cert.code}')">Ver Certificado</button></div></div></div>`;
            });
            html += `</div>`;
            content.innerHTML = html;
        }
        
        function viewCertificate(code) {
            const cert = certificates.find(c => c.code === code);
            if (!cert) return;
            const course = courses.find(c => c.id === cert.courseId);
            const modalDiv = document.getElementById('modal-container');
            modalDiv.innerHTML = `<div class="modal-overlay"><div class="modal"><div class="modal-header"><h3 class="modal-title">Certificado</h3><button class="modal-close" onclick="closeModal()">✕</button></div><div class="modal-body"><div class="text-center"><div style="border:2px solid #5B2D8E;padding:40px;border-radius:16px;"><h2 style="color:#2D1B69;">UNISO Voluntarios</h2><p class="mt-4">Certificamos que</p><h3 style="font-size:1.5rem;margin:20px 0;">${currentUser.name}</h3><p>concluiu com êxito o curso</p><h4 style="color:#5B2D8E;">${cert.courseTitle}</h4><p>com carga horária de ${course?.workload || 0} horas.</p><p class="mt-4">Código: ${cert.code}</p><p class="mt-4">Emitido em: ${new Date(cert.date).toLocaleDateString()}</p></div></div></div><div class="modal-footer"><button class="btn btn-primary" onclick="window.print();closeModal();">Imprimir</button><button class="btn btn-secondary" onclick="closeModal()">Fechar</button></div></div></div>`;
        }
        
        function loadProfile() {
            const content = document.getElementById('main-content');
            content.innerHTML = `<div class="page-header"><h1 class="page-title">Meu Perfil</h1></div><div class="card"><div class="card-body"><div class="text-center"><div class="avatar" style="width:80px;height:80px;font-size:2rem;margin:0 auto;">${currentUser.name.substring(0,2).toUpperCase()}</div><h2 class="mt-3">${currentUser.name}</h2><p>${currentUser.email}</p><p>${currentUser.role === 'admin' ? 'Administrador' : 'Aluno'}</p></div></div></div>`;
        }
        
        function closeModal() {
            document.getElementById('modal-container').innerHTML = '';
        }
        
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
        }
        
        function toggleUserMenu() {
            const menu = document.getElementById('user-menu');
            menu.classList.toggle('hidden');
        }
        
        document.addEventListener('click', function(e) {
            const menu = document.getElementById('user-menu');
            const userBtn = document.querySelector('.header-user');
            if (menu && userBtn && !userBtn.contains(e.target) && !menu.contains(e.target)) {
                menu.classList.add('hidden');
            }
        });
        
        document.getElementById('login-form-element').addEventListener('submit', handleLogin);
        document.getElementById('register-form-element').addEventListener('submit', handleRegister);
        
        initData();
        const savedUser = localStorage.getItem('currentUser');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            if (users.find(u => u.id === currentUser.id)) {
                document.getElementById('auth-container').classList.add('hidden');
                document.getElementById('app-container').classList.remove('hidden');
                updateUserInterface();
                loadDashboard();
            } else {
                localStorage.removeItem('currentUser');
            }
        }
        document.getElementById('loading-overlay').style.display = 'none';
        
        window.showLoginForm = showLoginForm;
        window.showRegisterForm = showRegisterForm;
        window.logout = logout;
        window.navigateTo = navigateTo;
        window.enrollCourse = enrollCourse;
        window.viewCourse = viewCourse;
        window.markProgress = markProgress;
        window.viewCertificate = viewCertificate;
        window.closeModal = closeModal;
        window.toggleSidebar = toggleSidebar;
        window.toggleUserMenu = toggleUserMenu;
    </script>
</body>
</html>
